openapi: 3.0.0
info:
  title: IoSonoTrento API
  version: 1.0.0
paths:
  /categorie:
    post:
      summary: Crea una nuova categoria per iniziativa
      description: Permette a un operatore autenticato di creare una nuova categoria per le iniziative
      tags:
        - Categorie
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
              properties:
                nome:
                  type: string
                  description: Nome della categoria
                  example: Ambiente
      responses:
        '201':
          description: Categoria creata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Categoria creata con successo
                  categoria:
                    $ref: '#/components/schemas/Categoria'
              examples:
                success:
                  value:
                    message: Categoria creata con successo
                    categoria:
                      _id: 507f1f77bcf86cd799439011
                      nome: Ambiente
                      createdAt: '2025-12-05T16:00:00.000Z'
                      updatedAt: '2025-12-05T16:00:00.000Z'
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingNome:
                  value:
                    message: Nome categoria obbligatorio
        '401':
          description: Non autenticato - sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Non autenticato
        '403':
          description: Accesso negato - ruolo non autorizzato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Accesso negato
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la creazione della categoria
                error: Duplicate key error
    get:
      summary: Ottieni tutte le categorie
      description: Restituisce la lista di tutte le categorie
      tags:
        - Categorie
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Categorie recuperate con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Categorie recuperate con successo.
                  categorie:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'
              examples:
                success:
                  value:
                    message: Categorie recuperate con successo.
                    categorie:
                      - _id: 507f1f77bcf86cd799439011
                        nome: Ambiente
                        createdAt: '2025-12-05T16:00:00.000Z'
                        updatedAt: '2025-12-05T16:00:00.000Z'
                empty:
                  value:
                    message: Nessuna categoria trovata.
                    categorie: []
        '401':
          description: Non autenticato - sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Non autenticato
        '403':
          description: Accesso negato - ruolo non autorizzato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Accesso negato
        '500':
          description: Errore interno del server durante la ricerca delle categorie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la ricerca delle categorie.
                error: Database connection error
  /categorie/{id}:
    get:
      summary: Ottieni dettagli categoria
      description: Restituisce i dettagli di una categoria specifica
      tags:
        - Categorie
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID della categoria
          example: 507f1f77bcf86cd799439011
      responses:
        '200':
          description: Categoria recuperata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Categoria recuperata con successo.
                  categoria:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 507f1f77bcf86cd799439011
                      nome:
                        type: string
                        example: Ambiente
                    $ref: '#/components/schemas/Categoria'
              examples:
                success:
                  value:
                    message: Categoria recuperata con successo.
                    categoria:
                      _id: 507f1f77bcf86cd799439011
                      nome: Ambiente
                      createdAt: '2025-12-05T16:00:00.000Z'
                      updatedAt: '2025-12-05T16:00:00.000Z'
        '400':
          description: ID non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: ID non valido.
        '401':
          description: Non autenticato - sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Non autenticato
        '403':
          description: Accesso negato - ruolo non autorizzato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Accesso negato
        '404':
          description: Categoria non trovata con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Categoria non trovata con l'ID specificato.
        '500':
          description: Errore interno del server durante la ricerca della categoria con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la ricerca della categoria.
                error: Database connection error
    patch:
      summary: Aggiorna una categoria
      description: Aggiorna una categoria specifica
      tags:
        - Categorie
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID della categoria
          example: 507f1f77bcf86cd799439011
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newNome
              properties:
                newNome:
                  type: string
                  description: Nuovo nome della categoria
                  example: Ambiente
      responses:
        '200':
          description: Categoria aggiornata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Categoria aggiornata con successo.
                  categoria:
                    $ref: '#/components/schemas/Categoria'
              examples:
                success:
                  value:
                    message: Categoria aggiornata con successo.
                    categoria:
                      _id: 507f1f77bcf86cd799439011
                      nome: Ambiente
                      createdAt: '2025-12-05T16:00:00.000Z'
                      updatedAt: '2025-12-05T16:00:00.000Z'
        '400':
          description: ID non valido o dati mancanti
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidId:
                  value:
                    message: ID non valido.
                missingFields:
                  value:
                    message: ID e nuovo nome categoria obbligatori.
        '401':
          description: Non autenticato - sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Non autenticato
        '403':
          description: Accesso negato - ruolo non autorizzato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Accesso negato
        '404':
          description: Categoria non trovata con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Categoria non trovata con l'ID specificato.
        '500':
          description: Errore interno del server durante l'aggiornamento della categoria.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante l'aggiornamento della categoria.
                error: Database connection error
    delete:
      summary: Elimina una categoria
      description: Elimina una categoria specifica
      tags:
        - Categorie
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID della categoria
          example: 507f1f77bcf86cd799439011
      responses:
        '200':
          description: Categoria eliminata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Categoria eliminata con successo.
        '400':
          description: ID non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: ID non valido.
        '401':
          description: Non autenticato - sessione non valida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Non autenticato
        '403':
          description: Accesso negato - ruolo non autorizzato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Accesso negato
        '404':
          description: Categoria non trovata con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Categoria non trovata con l'ID specificato.
        '500':
          description: Errore interno del server durante l'eliminazione della categoria con l'ID specificato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante l'eliminazione della categoria.
                error: Database connection error
  /auth/google:
    get:
      summary: Avvia autenticazione Google OAuth
      description: Reindirizza l'utente alla pagina di autenticazione Google
      tags:
        - Autenticazione
      responses:
        '302':
          description: Redirect a Google OAuth
  /auth/google/callback:
    get:
      summary: Callback OAuth Google
      description: >-
        Gestisce il callback dopo l'autenticazione Google. Restituisce un token JWT se il profilo è completo,
        altrimenti richiede il completamento del profilo.
      tags:
        - Autenticazione
      responses:
        '200':
          description: Login riuscito - profilo completo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login riuscito!
                  token:
                    type: string
                    description: JWT token per autenticazione
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  status:
                    type: string
                    enum:
                      - COMPLETE
                    example: COMPLETE
        '202':
          description: Profilo incompleto - richiede completamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profilo incompleto. Completamento necessario.
                  status:
                    type: string
                    enum:
                      - INCOMPLETE_PROFILE
                    example: INCOMPLETE_PROFILE
                  cittadinoId:
                    type: string
                    example: 507f1f77bcf86cd799439011
                  email:
                    type: string
                    format: email
                    example: mario.rossi@example.com
  /auth/complete-profile:
    post:
      summary: Completa il profilo del cittadino
      description: Permette di completare il profilo di un cittadino dopo il primo login con Google OAuth
      tags:
        - Autenticazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteProfileInput'
      responses:
        '200':
          description: Profilo completato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profilo completato, accesso eseguito!
                  token:
                    type: string
                    description: JWT token per autenticazione
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Tutti i campi del profilo sono obbligatori.
        '404':
          description: Cittadino non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Cittadino non trovato.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Errore di validazione o server.
                  details:
                    type: string
                    example: Validation error details
  /cittadino/logout:
    post:
      summary: Logout cittadino
      description: >-
        Effettua il logout del cittadino autenticato impostando il flag loggedIn a false. Il token JWT rimane
        tecnicamente valido fino alla sua scadenza naturale — il client deve eliminarlo.
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Logout effettuato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout effettuato con successo.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante il logout.
                error: Database error
  /cittadino/profile:
    get:
      summary: Ottieni i dati del profilo del cittadino
      description: Restituisce i dati pubblici del cittadino autenticato
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Dati cittadino recuperati con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Dati cittadino recuperati con successo
                  data:
                    $ref: '#/components/schemas/Cittadino'
        '404':
          description: Utente non trovato o non identificato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notIdentified:
                  value:
                    message: Utente non identificato dal sistema (Internal Error)
                notFound:
                  value:
                    message: Risorsa utente non trovata nel database
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cittadino/vote/votazione:
    post:
      summary: Rispondi a una votazione
      description: >-
        Permette a un cittadino autenticato di votare per una votazione. Se la domanda è a risposta multipla,
        `opzioniId` può contenere più opzioni; se è a risposta singola deve contenerne esattamente una.
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteVotazioneInput'
      responses:
        '200':
          description: Votazione avvenuta con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Votazione avvenuta con successo.
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingOption:
                  value:
                    message: Scegliere almeno un'opzione.
                singleRequired:
                  value:
                    message: La votazione richiede esattamente una risposta.
                invalidOption:
                  value:
                    message: 'Le risposte contengono opzioni non valide: 507f1f77bcf86cd799439099'
        '403':
          description: Voto non consentito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                notActive:
                  value:
                    message: La votazione non è attiva.
                alreadyVoted:
                  value:
                    message: L'utente ha gia votato questa Votazione.
        '404':
          description: Cittadino non identificato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Cittadino non identificato dal sistema (Internal Error)
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cittadino/vote/iniziativa:
    post:
      summary: Vota un'iniziativa
      description: Permette a un cittadino autenticato di votare per un'iniziativa
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteIniziativaInput'
      responses:
        '200':
          description: Votazione avvenuta con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Votazione avvenuta con successo.
        '403':
          description: L'utente ha già votato questa iniziativa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Hai gia votato per questa iniziativa
        '404':
          description: Iniziativa non trovata o cittadino non identificato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                iniziativaNotFound:
                  value:
                    message: Iniziativa non trovata
                cittadinoNotIdentified:
                  value:
                    message: Cittadino non identificato dal sistema (Internal Error)
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /cittadino/vote/iniziativa/{iniziativaId}:
    delete:
      summary: Rimuovi voto da un'iniziativa
      description: >-
        Permette a un cittadino autenticato di ritirare il proprio voto da un'iniziativa precedentemente
        votata.
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      parameters:
        - name: iniziativaId
          in: path
          required: true
          description: ID dell'iniziativa da cui rimuovere il voto
          example: 507f1f77bcf86cd799439011
      responses:
        '200':
          description: Voto rimosso con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Voto rimosso con successo.
        '404':
          description: Voto non trovato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: 'Voto non trovato: non hai votato per questa iniziativa.'
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la rimozione del voto.
                error: Database error
  /cittadino/vote/sondaggio:
    post:
      summary: Rispondi a un sondaggio
      description: >-
        Permette a un cittadino autenticato di rispondere a tutte le domande di un sondaggio attivo. L'utente
        può rispondere una sola volta per sondaggio. Le risposte devono includere tutte le domande del
        sondaggio e rispettare i vincoli (risposta singola o multipla).
      tags:
        - Cittadino
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sondaggioId
                - dettagliRisposte
              properties:
                sondaggioId:
                  type: string
                  description: ID del sondaggio a cui rispondere
                  example: 507f1f77bcf86cd799439011
                dettagliRisposte:
                  type: array
                  description: Array contenente le risposte per ogni domanda del sondaggio
                  items:
                    type: object
                    required:
                      - ID_domanda
                      - opzioniScelte
                    properties:
                      ID_domanda:
                        type: string
                        description: ID della domanda
                        example: 507f1f77bcf86cd799439012
                      opzioniScelte:
                        type: array
                        description: >-
                          Array di ID delle opzioni scelte (1 elemento per risposta singola, 1+ per risposta
                          multipla)
                        items:
                          type: string
                        example:
                          - 507f1f77bcf86cd799439013
            examples:
              rispostaSingola:
                summary: Esempio con risposte singole
                value:
                  sondaggioId: 507f1f77bcf86cd799439011
                  dettagliRisposte:
                    - ID_domanda: 507f1f77bcf86cd799439012
                      opzioniScelte:
                        - 507f1f77bcf86cd799439013
                    - ID_domanda: 507f1f77bcf86cd799439014
                      opzioniScelte:
                        - 507f1f77bcf86cd799439015
              rispostaMultipla:
                summary: Esempio con risposta multipla
                value:
                  sondaggioId: 507f1f77bcf86cd799439011
                  dettagliRisposte:
                    - ID_domanda: 507f1f77bcf86cd799439012
                      opzioniScelte:
                        - 507f1f77bcf86cd799439013
                    - ID_domanda: 507f1f77bcf86cd799439016
                      opzioniScelte:
                        - 507f1f77bcf86cd799439017
                        - 507f1f77bcf86cd799439018
                        - 507f1f77bcf86cd799439019
      responses:
        '200':
          description: Risposta al sondaggio avvenuta con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Risposta sondaggio avvenuta con successo
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingData:
                  value:
                    message: Dati di risposta mancanti o non validi.
                wrongNumberOfAnswers:
                  value:
                    message: Il numero di risposte fornite non corrisponde al numero di domande nel sondaggio.
                questionNotInSurvey:
                  value:
                    message: Domanda con ID 507f1f77bcf86cd799439012 non presente nel sondaggio.
                wrongSingleAnswer:
                  value:
                    message: La domanda 507f1f77bcf86cd799439012 richiede esattamente una risposta.
                invalidOptions:
                  value:
                    message: >-
                      Le risposte per la domanda 507f1f77bcf86cd799439012 contengono opzioni non valide:
                      507f1f77bcf86cd799439099
        '401':
          description: Cittadino non autenticato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Cittadino non identificato o non autenticato.
        '403':
          description: Sondaggio già votato o non disponibile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                alreadyVoted:
                  value:
                    message: L'utente ha già votato questo sondaggio.
                surveyNotActive:
                  value:
                    message: Il sondaggio selezionato non è valido o non è attivo.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la votazione.
                error: Database connection error
  /iniziative:
    post:
      summary: Crea una nuova iniziativa
      description: Permette a un cittadino autenticato di creare una nuova iniziativa
      tags:
        - Iniziative
      security:
