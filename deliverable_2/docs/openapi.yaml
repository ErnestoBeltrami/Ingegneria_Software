  /sondaggi/cittadino:
    get:
      summary: Recupera sondaggi disponibili per i cittadini
      description: >-
        Restituisce la lista di tutti i sondaggi in stato "attivo" o "concluso", visibili ai cittadini
        autenticati. I sondaggi sono ordinati per data di inizio (più recenti prima). A differenza delle
        votazioni, i sondaggi contengono multiple domande (ID_domande array) invece di una singola domanda.
        Ogni elemento include il campo `voted` (`true` se il cittadino ha già risposto, `false` altrimenti).
      tags:
        - Sondaggi
      security:
        - sessionAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Numero di pagina (default 1)
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Risultati per pagina (max 100, default 10)
      responses:
        '200':
          description: Sondaggi recuperati con successo o nessun sondaggio disponibile
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Messaggio di conferma
                  sondaggi:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Consultazione'
                        - type: object
                          properties:
                            tipo:
                              type: string
                              enum:
                                - sondaggio
                              example: sondaggio
                            ID_domande:
                              type: array
                              items:
                                type: string
                              description: Array di ID delle domande associate al sondaggio (minimo 1)
                              example:
                                - 507f1f77bcf86cd799439015
                                - 507f1f77bcf86cd799439016
                            voted:
                              type: boolean
                              description: true se il cittadino autenticato ha già risposto a questo sondaggio
                              example: false
                    description: Array di sondaggi disponibili (presente solo se ci sono sondaggi).
                  paginazione:
                    type: object
                    properties:
                      totale:
                        type: integer
                        example: 35
                      pagina:
                        type: integer
                        example: 1
                      limite:
                        type: integer
                        example: 10
                      pagine:
                        type: integer
                        example: 4
              examples:
                withSondaggi:
