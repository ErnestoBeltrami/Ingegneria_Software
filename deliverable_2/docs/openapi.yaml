                        titolo: Votazione sul nuovo piano urbanistico
                        descrizione: Votazione per approvare il piano urbanistico 2025
                        data_inizio: '2025-12-10T00:00:00.000Z'
                        data_fine: '2025-12-20T00:00:00.000Z'
                        data_discussione: '2025-12-05T00:00:00.000Z'
                        creatoDa: 507f1f77bcf86cd799439012
                        ID_domande: []
                        voted: true
                      - _id: 507f1f77bcf86cd799439013
                        tipo: votazione
                        stato: concluso
                        titolo: Votazione sulla mobilità sostenibile
                        descrizione: Votazione per le nuove piste ciclabili
                        data_inizio: '2025-11-01T00:00:00.000Z'
                        data_fine: '2025-11-15T00:00:00.000Z'
                        data_discussione: '2025-10-25T00:00:00.000Z'
                        creatoDa: 507f1f77bcf86cd799439012
                        ID_domande: []
                        voted: false
                noVotazioni:
                  value:
                    message: Nessuna votazione disponibile al momento
        '401':
          description: Cittadino non autenticato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Cittadino non autenticato.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante il recupero delle votazioni.
                error: Database connection error
components:
  schemas:
    Categoria:
      type: object
      required:
        - nome
      properties:
        _id:
          type: string
          description: ID univoco della categoria
          example: 507f1f77bcf86cd799439011
        nome:
          type: string
          description: Nome della categoria
          example: Ambiente
        createdAt:
          type: string
          format: date-time
          description: Data di creazione
        updatedAt:
          type: string
          format: date-time
          description: Data di ultimo aggiornamento
    Error:
      type: object
      properties:
        message:
          type: string
          description: Messaggio di errore
        error:
          type: string
          description: Dettagli dell'errore (solo in caso di errore interno)
    Cittadino:
      type: object
      properties:
        id:
          type: string
          description: ID univoco del cittadino
          example: 507f1f77bcf86cd799439011
        ruolo:
          type: string
          enum:
            - cittadino
          example: cittadino
        nome:
          type: string
          description: Nome del cittadino
          example: Mario
        cognome:
          type: string
          description: Cognome del cittadino
          example: Rossi
        email:
          type: string
          format: email
          description: Email del cittadino
          example: mario.rossi@example.com
        dataNascita:
          type: string
          format: date
          description: Data di nascita del cittadino
          example: '1995-06-15'
        comuneResidenza:
          type: string
          description: Comune di residenza
          example: Trento
        circoscrizione:
          type: string
          description: Circoscrizione (solo per Trento)
          example: Centro storico - Piedicastello
        genere:
          type: string
          enum:
            - Uomo
            - Donna
          example: Uomo
        categoria:
          type: string
          enum:
            - Lavoratore
            - Disoccupato
            - Pensionato
            - Studente
            - Altro
          example: Lavoratore
        profiloCompleto:
          type: boolean
          description: Indica se il profilo è completo
          example: true
    CompleteProfileInput:
      type: object
      required:
        - cittadinoId
        - dataNascita
        - comuneResidenza
      properties:
        cittadinoId:
          type: string
          description: ID del cittadino
          example: 507f1f77bcf86cd799439011
        dataNascita:
          type: string
          format: date
          example: '1995-06-15'
        comuneResidenza:
          type: string
          example: Trento
        circoscrizione:
          type: string
          example: Centro storico - Piedicastello
    VoteVotazioneInput:
      type: object
      required:
        - votazioneId
      properties:
        opzioniId:
          type: array
          items:
            type: string
          description: >-
            ID delle opzioni scelte. Per domande a risposta singola deve contenere un solo elemento; per la
            risposta multipla può contenerne più di uno.
          example:
            - 507f1f77bcf86cd799439011
            - 507f1f77bcf86cd799439013
        opzioneId:
          type: string
          description: (Deprecato) ID di una singola opzione. Mantenuto per retrocompatibilità; preferire opzioniId.
          example: 507f1f77bcf86cd799439011
        votazioneId:
          type: string
          description: ID della votazione
          example: 507f1f77bcf86cd799439012
    VoteIniziativaInput:
      type: object
      required:
        - iniziativaID
      properties:
        iniziativaID:
          type: string
          description: ID dell'iniziativa
          example: 507f1f77bcf86cd799439011
    Iniziativa:
      type: object
      required:
        - ID_categoria
        - titolo
        - ID_cittadino
        - descrizione
      properties:
        _id:
          type: string
          description: ID univoco dell'iniziativa
          example: 507f1f77bcf86cd799439011
        ID_categoria:
          type: string
          description: ID della categoria
          example: 507f1f77bcf86cd799439012
        titolo:
          type: string
          description: Titolo dell'iniziativa
          example: Pulizia parchi pubblici
        ID_cittadino:
          type: string
          description: ID del cittadino creatore
          example: 507f1f77bcf86cd799439013
        descrizione:
          type: string
          description: Descrizione dettagliata dell'iniziativa
          example: Proposta per organizzare giornate di pulizia nei parchi pubblici della città
        createdAt:
          type: string
          format: date-time
          description: Data di creazione
        updatedAt:
          type: string
          format: date-time
          description: Data di ultimo aggiornamento
    IniziativaWithDetails:
      type: object
      properties:
        _id:
          type: string
          description: ID univoco dell'iniziativa
          example: 507f1f77bcf86cd799439011
        ID_categoria:
          type: string
          description: ID della categoria
          example: 507f1f77bcf86cd799439012
        categoria:
          type: string
          description: Nome della categoria
          example: Ambiente
        titolo:
          type: string
          description: Titolo dell'iniziativa
          example: Pulizia parchi pubblici
        nome_cittadino:
          type: string
          description: Nome del cittadino creatore
          example: Mario
        cognome_cittadino:
          type: string
          description: Cognome del cittadino creatore
          example: Rossi
        numero_voti:
          type: number
          description: Numero di voti ricevuti
          example: 42
        createdAt:
          type: string
          format: date-time
          description: Data di creazione
    CreateIniziativaInput:
      type: object
      required:
        - ID_categoria
        - titolo
        - ID_cittadino
        - descrizione
      properties:
        ID_categoria:
          type: string
          description: ID della categoria
          example: 507f1f77bcf86cd799439012
        titolo:
          type: string
          description: Titolo dell'iniziativa
          example: Pulizia parchi pubblici
        ID_cittadino:
          type: string
          description: ID del cittadino creatore
          example: 507f1f77bcf86cd799439013
        descrizione:
          type: string
          description: Descrizione dettagliata dell'iniziativa
          example: Proposta per organizzare giornate di pulizia nei parchi pubblici della città
    UpdateIniziativaInput:
      type: object
      properties:
        titolo:
          type: string
          description: Titolo dell'iniziativa
          example: Pulizia parchi pubblici
        descrizione:
          type: string
          description: Descrizione dettagliata dell'iniziativa
          example: Proposta per organizzare giornate di pulizia nei parchi pubblici della città
        ID_categoria:
          type: string
          description: ID della categoria
          example: 507f1f77bcf86cd799439012
    RicercaIniziativaInput:
      type: object
      properties:
        parola_chiave:
          type: string
          description: Parola chiave per la ricerca nel titolo e descrizione
          example: giardino
        filtri:
          type: object
          properties:
            categorie_id:
              type: array
              items:
                type: string
              description: Array di ID delle categorie da filtrare
              example:
                - 507f1f77bcf86cd799439012
            ordina_per:
              type: string
              enum:
                - data
                - voti
              description: Campo per l'ordinamento (data o voti)
              example: data
            ordine:
              type: number
              enum:
                - 1
                - -1
              description: Ordine di ordinamento (1 = crescente, -1 = decrescente)
              default: -1
              example: -1
    Operatore:
      type: object
      required:
        - username
        - password
        - nome
        - cognome
      properties:
        _id:
          type: string
          description: ID univoco dell'operatore
          example: 507f1f77bcf86cd799439011
        username:
          type: string
          description: Username dell'operatore
          example: admin
        nome:
          type: string
          description: Nome dell'operatore
          example: Mario
        cognome:
          type: string
          description: Cognome dell'operatore
          example: Rossi
        isRoot:
          type: boolean
          description: Indica se l'operatore ha privilegi root
          example: false
    OperatorePublic:
      type: object
      properties:
        id:
          type: string
          description: ID univoco dell'operatore
          example: 507f1f77bcf86cd799439011
        username:
          type: string
          description: Username dell'operatore
          example: admin
        nome:
          type: string
          description: Nome dell'operatore
          example: Mario
        cognome:
          type: string
          description: Cognome dell'operatore
          example: Rossi
    LoginOperatoreInput:
      type: object
      required:
        - username
        - password_inserita
      properties:
        username:
          type: string
          description: Username dell'operatore
          example: admin
        password_inserita:
          type: string
          format: password
          description: Password dell'operatore
          example: password123
    CreateOperatoreInput:
      type: object
      required:
        - username
        - password
        - nome
        - cognome
      properties:
        username:
          type: string
          description: Username dell'operatore
          example: operatore1
        password:
          type: string
          format: password
          description: Password dell'operatore
          example: password123
        nome:
          type: string
          description: Nome dell'operatore
          example: Mario
        cognome:
          type: string
          description: Cognome dell'operatore
          example: Rossi
    Opzione:
      type: object
      required:
        - testo
      properties:
        _id:
          type: string
          description: ID univoco dell'opzione
          example: 507f1f77bcf86cd799439011
        testo:
          type: string
          description: Testo dell'opzione
          example: Sì
    Domanda:
      type: object
      required:
        - titolo
        - tipo
        - opzioni
      properties:
        _id:
          type: string
          description: ID univoco della domanda
          example: 507f1f77bcf86cd799439011
        titolo:
          type: string
          description: Testo della domanda
          example: Sei favorevole alla proposta?
        tipo:
          type: string
          enum:
            - risposta_multipla
            - risposta_singola
          description: Tipo di risposta consentita
          example: risposta_singola
        opzioni:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Opzione'
          description: Array di opzioni di risposta
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Votazione:
      type: object
      required:
        - titolo
        - descrizione
        - data_inizio
        - data_fine
        - data_discussione
        - ID_domanda
        - creatoDa
      properties:
        _id:
          type: string
          description: ID univoco della votazione
          example: 507f1f77bcf86cd799439011
        titolo:
          type: string
          description: Titolo della votazione
          example: Referendum sulla proposta X
        descrizione:
          type: string
          description: Descrizione dettagliata della votazione
          example: Votazione per decidere se approvare la proposta X
        stato:
          type: string
          enum:
            - attivo
            - bozza
            - concluso
            - archiviato
          default: bozza
          description: Stato della votazione
          example: bozza
        ID_domanda:
          type: string
          description: ID della domanda associata
          example: 507f1f77bcf86cd799439012
        creatoDa:
          type: string
          description: ID dell'operatore creatore
          example: 507f1f77bcf86cd799439013
        data_inizio:
          type: string
          format: date-time
          description: Data di inizio della votazione
          example: '2025-12-10T00:00:00.000Z'
        data_fine:
          type: string
          format: date-time
          description: Data di fine della votazione
          example: '2025-12-20T00:00:00.000Z'
        data_discussione:
          type: string
          format: date-time
          description: Data di discussione (deve essere prima di data_inizio)
          example: '2025-12-05T00:00:00.000Z'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VotazioneWithDomanda:
      type: object
      allOf:
        - $ref: '#/components/schemas/Votazione'
        - type: object
          properties:
            ID_domanda:
              $ref: '#/components/schemas/Domanda'
    CreateVotazioneInput:
      type: object
      required:
        - tipo
        - titolo
        - descrizione
        - data_inizio
        - data_fine
        - data_discussione
        - domanda
      properties:
        tipo:
          type: string
          enum:
            - votazione
          example: votazione
        titolo:
          type: string
          description: Titolo della votazione
          example: Referendum sulla proposta X
        descrizione:
          type: string
          description: Descrizione dettagliata della votazione
          example: Votazione per decidere se approvare la proposta X
        data_inizio:
          type: string
          format: date-time
          description: Data di inizio della votazione
          example: '2025-12-10T00:00:00.000Z'
        data_fine:
          type: string
          format: date-time
          description: Data di fine della votazione
          example: '2025-12-20T00:00:00.000Z'
        data_discussione:
          type: string
          format: date-time
          description: Data di discussione (deve essere prima di data_inizio)
          example: '2025-12-05T00:00:00.000Z'
        domanda:
          type: object
          required:
            - titolo
            - tipo
            - opzioni
          properties:
            titolo:
              type: string
              example: Sei favorevole alla proposta?
            tipo:
              type: string
              enum:
                - risposta_multipla
                - risposta_singola
              example: risposta_singola
            opzioni:
              type: array
              minItems: 2
              items:
                type: object
                required:
                  - testo
                properties:
                  testo:
                    type: string
                    example: Sì
    UpdateVotazioneInput:
      type: object
      properties:
        titolo:
          type: string
          example: Referendum sulla proposta X (aggiornato)
        descrizione:
          type: string
          example: Descrizione aggiornata
        data_inizio:
          type: string
          format: date-time
          example: '2025-12-10T00:00:00.000Z'
        data_fine:
          type: string
          format: date-time
          example: '2025-12-20T00:00:00.000Z'
        data_discussione:
          type: string
          format: date-time
          example: '2025-12-05T00:00:00.000Z'
    RiepilogoRisultato:
      type: object
      properties:
        opzioneId:
          type: string
          description: ID dell'opzione
          example: 507f1f77bcf86cd799439011
        testoOpzione:
          type: string
          description: Testo dell'opzione
          example: Sì
        voti:
          type: number
          description: Numero di voti ricevuti
          example: 42
        percentuale:
          type: number
          format: float
          description: Percentuale di voti (con 2 decimali)
          example: 65.5
    Sondaggio:
      type: object
      required:
        - tipo
        - titolo
        - descrizione
        - data_inizio
        - data_fine
        - data_discussione
        - ID_domande
        - creatoDa
      properties:
        _id:
          type: string
          description: ID univoco del sondaggio
          example: 507f1f77bcf86cd799439011
        tipo:
          type: string
          enum:
            - sondaggio
          example: sondaggio
        stato:
          type: string
          enum:
            - attivo
            - bozza
            - concluso
            - archiviato
          default: bozza
          example: bozza
        titolo:
          type: string
          description: Titolo del sondaggio
          example: Sondaggio sulla qualità dei servizi
        descrizione:
          type: string
          description: Descrizione dettagliata del sondaggio
          example: Sondaggio per valutare la soddisfazione dei cittadini
        ID_domande:
          type: array
          items:
            type: string
          description: Array di ID delle domande associate
          example:
            - 507f1f77bcf86cd799439011
            - 507f1f77bcf86cd799439012
        creatoDa:
          type: string
          description: ID dell'operatore creatore
          example: 507f1f77bcf86cd799439013
        data_inizio:
          type: string
          format: date-time
          description: Data di inizio del sondaggio
          example: '2025-12-10T00:00:00.000Z'
        data_fine:
          type: string
          format: date-time
          description: Data di fine del sondaggio
          example: '2025-12-20T00:00:00.000Z'
        data_discussione:
          type: string
          format: date-time
          description: Data di discussione (deve essere prima di data_inizio)
          example: '2025-12-05T00:00:00.000Z'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSondaggioInput:
      type: object
      required:
        - titolo
        - descrizione
        - data_inizio
        - data_fine
        - data_discussione
        - domande
      properties:
        titolo:
          type: string
          description: Titolo del sondaggio
          example: Sondaggio sulla qualità dei servizi
        descrizione:
          type: string
          description: Descrizione dettagliata del sondaggio
          example: Sondaggio per valutare la soddisfazione dei cittadini
        data_inizio:
          type: string
          format: date-time
          description: Data di inizio del sondaggio
          example: '2025-12-10T00:00:00.000Z'
        data_fine:
          type: string
          format: date-time
          description: Data di fine del sondaggio
          example: '2025-12-20T00:00:00.000Z'
        data_discussione:
          type: string
          format: date-time
          description: Data di discussione (deve essere prima di data_inizio)
          example: '2025-12-05T00:00:00.000Z'
        domande:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - titolo
              - tipo
              - opzioni
            properties:
              titolo:
                type: string
                description: Testo della domanda
                example: Come valuti la qualità del servizio?
              tipo:
                type: string
                enum:
                  - risposta_multipla
                  - risposta_singola
                description: Tipo di risposta consentita
                example: risposta_singola
              opzioni:
                type: array
                minItems: 2
                items:
                  type: object
                  required:
                    - testo
                  properties:
                    testo:
                      type: string
                      description: Testo dell'opzione
                      example: Eccellente
    Notifica:
      type: object
      properties:
        _id:
          type: string
          description: ID univoco della notifica
          example: 507f1f77bcf86cd799439011
        ID_destinatario:
          type: string
          description: ID del cittadino destinatario
          example: 507f1f77bcf86cd799439013
        tipo:
          type: string
          enum:
            - iniziativa_approvata
            - iniziativa_rifiutata
          description: Tipo di notifica
          example: iniziativa_approvata
        messaggio:
          type: string
          description: Testo della notifica
          example: La tua iniziativa "Pulizia parchi pubblici" è stata approvata e pubblicata.
        ID_iniziativa:
          type: string
          description: ID dell'iniziativa a cui si riferisce la notifica
          example: 507f1f77bcf86cd799439012
        letta:
          type: boolean
          description: Indica se la notifica è stata letta
          example: false
        createdAt:
          type: string
          format: date-time
          description: Data di creazione
        updatedAt:
          type: string
          format: date-time
          description: Data di ultimo aggiornamento
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Session cookie per autenticazione
tags: []
