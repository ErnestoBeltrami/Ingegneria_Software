  /sondaggi:
    post:
      summary: Crea un nuovo sondaggio
      description: >-
        Permette a un operatore autenticato di creare un nuovo sondaggio con multiple domande. Crea
        automaticamente tutte le domande associate e il sondaggio. Se la creazione fallisce, elimina
        automaticamente le risorse create (cleanup).
      tags:
        - Sondaggi
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSondaggioInput'
            example:
              titolo: Sondaggio sulla qualità dei servizi
              descrizione: Sondaggio per valutare la soddisfazione dei cittadini sui servizi pubblici
              data_inizio: '2025-12-10T00:00:00.000Z'
              data_fine: '2025-12-20T00:00:00.000Z'
              data_discussione: '2025-12-05T00:00:00.000Z'
              domande:
                - titolo: Come valuti la qualità del servizio?
                  tipo: risposta_singola
                  opzioni:
                    - testo: Eccellente
                    - testo: Buono
                    - testo: Sufficiente
                    - testo: Scarso
                - titolo: Quali servizi utilizzi più spesso?
                  tipo: risposta_multipla
                  opzioni:
                    - testo: Servizi sanitari
                    - testo: Servizi educativi
                    - testo: Servizi di trasporto
                    - testo: Servizi amministrativi
      responses:
        '201':
          description: Sondaggio creato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Creazione sondaggio e domande avvenuta con successo.
                  sondaggioId:
                    type: string
                    description: ID del sondaggio creato
                    example: 507f1f77bcf86cd799439011
        '400':
          description: Dati mancanti o non validi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingFields:
                  value:
                    message: >-
                      Inserire correttamente tutti i campi (titolo, descrizione, date, data_discussione e
                      almeno una domanda).
                invalidDates:
                  value:
                    message: La data di inizio deve essere antecedente alla data di fine.
                invalidDiscussione:
                  value:
                    message: La data di discussione deve essere antecedente alla data di inizio.
                invalidDomande:
                  value:
                    message: Tutte le domande devono avere titolo, tipo e un array di opzioni valido.
        '401':
          description: Operatore non autenticato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Operatore non autenticato.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante la creazione del sondaggio.
    get:
      summary: Lista sondaggi dell'operatore
      description: >-
        Restituisce la lista paginata dei sondaggi creati dall'operatore autenticato, ordinati per data di
        inizio (più recenti prima). Supporta filtro per stato e paginazione.
      tags:
        - Sondaggi
      security:
        - sessionAuth: []
      parameters:
        - in: query
          name: stato
          schema:
            type: string
            enum:
              - bozza
              - attivo
              - concluso
              - archiviato
          description: Filtra i sondaggi per stato
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Numero di pagina
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Numero di risultati per pagina (max 100)
      responses:
        '200':
          description: Sondaggi recuperati con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Sondaggi recuperati con successo.
                  sondaggi:
                    type: array
                    items:
                      $ref: '#/components/schemas/Sondaggio'
                  paginazione:
                    type: object
                    properties:
                      totale:
                        type: integer
                        example: 42
                      pagina:
                        type: integer
                        example: 1
                      limite:
                        type: integer
                        example: 10
                      pagine:
                        type: integer
                        example: 5
        '400':
          description: Stato non valido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: 'Stato non valido. Valori ammessi: bozza, attivo, concluso, archiviato.'
        '401':
          description: Operatore non autenticato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Operatore non autenticato.
        '500':
          description: Errore interno del server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Errore interno del server durante il recupero dei sondaggi.
